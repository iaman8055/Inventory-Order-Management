version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: inventory-db
    restart: always
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    image: iamanchauhan/inventory-api:latest
    container_name: inventory-backend
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    # 👇 This injects your .env file into the Docker Hub image at startup
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
    container_name: inventory-frontend
    depends_on:
      - backend
    ports:
      - "3000:4173"

volumes:
  postgres_data: